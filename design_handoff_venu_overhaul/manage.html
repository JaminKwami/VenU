<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VenU — Manage Venues</title>
<script>(function(){try{var s=JSON.parse(localStorage.getItem('venu_appearance_v1')||'{}');document.documentElement.setAttribute('data-theme',s.theme||'light');if(s.accent&&s.accent!=='cobalt')document.documentElement.setAttribute('data-accent',s.accent);document.documentElement.setAttribute('data-motion',s.motion||'cinematic');}catch(e){}})();</script>
<link rel="stylesheet" href="assets/venu.css" />
<style>
  .mg-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1.6rem; }
  .vcell { display: flex; align-items: center; gap: .8rem; }
  .vcell .vthumb { width: 40px; height: 40px; border-radius: var(--r-sm); flex-shrink: 0; }
  .vcell .vn { font-weight: 600; font-size: .94rem; }
  .vcell .vl { font-family: var(--font-mono); font-size: .62rem; color: var(--ink-45); text-transform: uppercase; letter-spacing: .05em; }
  .util-bar { width: 90px; }
  .toolbar { display: flex; align-items: center; gap: .6rem; margin-bottom: 1.4rem; flex-wrap: wrap; }
  .search-box { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
  .search-box svg { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; color: var(--ink-45); }
  .search-box input { padding-left: 2.7rem; }
  .row-act { display: flex; gap: .4rem; justify-content: flex-end; }
  .row-act button { width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center; border: 1px solid var(--line-2); background: var(--surface); color: var(--ink-65); transition: all .25s var(--ease); }
  .row-act button:hover { color: var(--ink); border-color: var(--ink-45); }
  .row-act button svg { width: 15px; height: 15px; }
  .toggle { width: 40px; height: 23px; border-radius: 100px; background: var(--canvas-2); position: relative; border: 1px solid var(--line-2); cursor: pointer; transition: background .3s var(--ease); }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 17px; height: 17px; border-radius: 50%; background: var(--surface); box-shadow: var(--sh-1); transition: transform .3s var(--spring); }
  .toggle.on { background: var(--success); border-color: var(--success); }
  .toggle.on::after { transform: translateX(17px); }
  @media (max-width: 980px){ .mg-stats{grid-template-columns:repeat(2,1fr)} .hide-sm{display:none} }
</style>
</head>
<body>
<main class="main" data-shell="manage" data-title="Manage Venues" data-user="Dana Reyes" data-role="Facilities · Admin" data-screen-label="Manage venues">
  <header class="topbar"><div class="tb-title"></div><div class="tb-actions"><button class="btn btn-primary btn-sm"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Add venue</button></div></header>

  <div class="page" style="max-width:1320px">
    <div class="page-head reveal">
      <span class="eyebrow">Catalogue</span>
      <h1>Manage venues</h1>
      <p>Add, edit and toggle availability across all 240 bookable spaces.</p>
    </div>

    <div class="mg-stats reveal">
      <div class="card stat-card"><span class="stat-accent"></span><div class="stat-label">Total venues</div><div class="stat-val">240</div></div>
      <div class="card stat-card"><span class="stat-accent" style="background:var(--success)"></span><div class="stat-label">Bookable</div><div class="stat-val">228</div></div>
      <div class="card stat-card"><span class="stat-accent" style="background:var(--warn)"></span><div class="stat-label">Under maintenance</div><div class="stat-val">12</div></div>
      <div class="card stat-card"><span class="stat-accent" style="background:var(--coral)"></span><div class="stat-label">Avg utilisation</div><div class="stat-val" style="font-size:1.7rem;margin-top:.9rem">68%</div></div>
    </div>

    <div class="toolbar reveal">
      <div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input class="input" placeholder="Search the catalogue…" /></div>
      <select class="select" style="max-width:160px"><option>All buildings</option><option>Building A</option><option>Arts Block</option><option>Science Wing</option></select>
      <select class="select" style="max-width:150px"><option>All statuses</option><option>Bookable</option><option>Maintenance</option></select>
    </div>

    <div class="table-wrap reveal">
      <table class="tbl">
        <thead><tr><th>Venue</th><th class="hide-sm">Type</th><th>Capacity</th><th class="hide-sm">Utilisation</th><th>Status</th><th>Bookable</th><th style="text-align:right">Actions</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<script src="assets/venu.js"></script>
<script>
  const ROWS = [
    { n: 'Hartman Auditorium', l: 'Building A · L1', t: 'Lecture hall', cap: 420, util: 86, status: 'live', on: true, g: 'linear-gradient(135deg,#2a4ddb,#6b3df0)' },
    { n: 'Briggs Design Studio', l: 'Arts Block · L3', t: 'Studio', cap: 40, util: 72, status: 'live', on: true, g: 'linear-gradient(135deg,#ff5a36,#d2861a)' },
    { n: 'Maxwell Research Lab', l: 'Science Wing · L2', t: 'Lab', cap: 24, util: 64, status: 'live', on: true, g: 'linear-gradient(135deg,#1f6c52,#2a4ddb)' },
    { n: 'Quad Lawn', l: 'Central Campus', t: 'Outdoor', cap: 600, util: 41, status: 'live', on: true, g: 'linear-gradient(135deg,#1f6c52,#7ec98f)' },
    { n: 'Lovelace Seminar 4', l: 'Building C · L2', t: 'Seminar', cap: 18, util: 93, status: 'live', on: true, g: 'linear-gradient(135deg,#6b3df0,#2a4ddb)' },
    { n: 'Athena Recital Room', l: 'Music School · L1', t: 'Music', cap: 60, util: 58, status: 'maint', on: false, g: 'linear-gradient(135deg,#d2861a,#ff5a36)' },
    { n: 'Turing Maker Space', l: 'Engineering · L0', t: 'Lab', cap: 30, util: 77, status: 'live', on: true, g: 'linear-gradient(135deg,#2a4ddb,#1f6c52)' },
    { n: 'Keller Sports Court', l: 'Sports Centre', t: 'Sports', cap: 200, util: 49, status: 'live', on: true, g: 'linear-gradient(135deg,#1f6c52,#2a4ddb)' },
    { n: 'Da Vinci Lecture 2', l: 'Building A · L2', t: 'Lecture hall', cap: 180, util: 70, status: 'maint', on: false, g: 'linear-gradient(135deg,#6b3df0,#ff5a36)' }
  ];
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = ROWS.map((r, i) => `
    <tr>
      <td><div class="vcell"><span class="vthumb" style="background:${r.g}"></span><div><div class="vn">${r.n}</div><div class="vl">${r.l}</div></div></div></td>
      <td class="hide-sm"><span class="badge badge-neutral">${r.t}</span></td>
      <td class="mono" style="font-weight:700">${r.cap}</td>
      <td class="hide-sm"><div class="row" style="gap:.6rem"><div class="cap-bar util-bar"><span style="width:${r.util}%;background:${r.util>90?'var(--warn)':'var(--accent)'}"></span></div><span class="mono" style="font-size:.78rem;color:var(--ink-65)">${r.util}%</span></div></td>
      <td>${r.status === 'live' ? '<span class="badge badge-approved"><span class="dot"></span>Live</span>' : '<span class="badge badge-pending"><span class="dot"></span>Maintenance</span>'}</td>
      <td><div class="toggle ${r.on ? 'on' : ''}" data-i="${i}" role="switch" aria-checked="${r.on}"></div></td>
      <td><div class="row-act">
        <button title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg></button>
        <button title="View"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div></td>
    </tr>`).join('');
  tbody.querySelectorAll('.toggle').forEach(t => t.addEventListener('click', () => {
    t.classList.toggle('on');
    t.setAttribute('aria-checked', t.classList.contains('on'));
  }));
</script>
</body>
</html>
