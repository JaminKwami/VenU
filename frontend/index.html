<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VenU — Venue Booking</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2D4EAA" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="VenU" />
    <script>
      /* Apply persisted appearance before first paint (no FOUC).
         Handles both the raw shape and zustand-persist's {state,version}. */
      (function () {
        try {
          var raw = JSON.parse(localStorage.getItem('venu_appearance_v1') || '{}');
          var s = raw.state || raw;
          document.documentElement.setAttribute('data-theme', s.theme || 'light');
          if (s.accent && s.accent !== 'cobalt') document.documentElement.setAttribute('data-accent', s.accent);
          document.documentElement.setAttribute('data-motion', s.motion || 'cinematic');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript><style>.reveal { opacity: 1 !important; transform: none !important; }</style></noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
