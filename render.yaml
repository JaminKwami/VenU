services:
  - type: web
    name: venu-backend
    runtime: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false   # paste your Neon connection string in the Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # set to your Vercel URL, e.g. https://venu.vercel.app
      - key: PYTHON_VERSION
        value: "3.12.7"
